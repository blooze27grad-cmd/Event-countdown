<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0f766e">
  <title>CountNow</title>
  <link rel="manifest" href="manifest.json">
  <style>
    :root {
      color-scheme: light;
      --ink: #17211f;
      --muted: #66736f;
      --line: #d9e1de;
      --surface: #fbfcfb;
      --panel: #ffffff;
      --teal: #0f766e;
      --teal-dark: #0b5853;
      --amber: #e6a700;
      --coral: #d75b48;
      --plum: #6851a4;
      --shadow: 0 14px 40px rgba(23, 33, 31, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
      background: #edf4f2;
    }

    body {
      min-height: 100%;
      margin: 0;
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        linear-gradient(180deg, rgba(15, 118, 110, 0.13), rgba(251, 252, 251, 0) 280px),
        var(--surface);
    }

    button,
    input,
    select {
      font: inherit;
    }

    .app {
      width: min(100%, 560px);
      min-height: 100vh;
      margin: 0 auto;
      padding: max(16px, env(safe-area-inset-top)) 16px max(18px, env(safe-area-inset-bottom));
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 6px 0 16px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .brand-mark {
      display: grid;
      width: 42px;
      height: 42px;
      place-items: center;
      flex: 0 0 auto;
      border-radius: 8px;
      background: conic-gradient(from 210deg, var(--teal), #2f948a, var(--amber), var(--coral), var(--teal));
      box-shadow: var(--shadow);
    }

    .brand-mark svg {
      width: 24px;
      height: 24px;
      stroke: white;
      stroke-width: 2.3;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    h1 {
      margin: 0;
      font-size: 1.45rem;
      line-height: 1.1;
      letter-spacing: 0;
    }

    .today {
      margin: 3px 0 0;
      color: var(--muted);
      font-size: 0.85rem;
    }

    .icon-button {
      display: inline-grid;
      width: 42px;
      height: 42px;
      place-items: center;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--ink);
      background: rgba(255, 255, 255, 0.88);
      cursor: pointer;
    }

    .icon-button svg {
      width: 20px;
      height: 20px;
      stroke: currentColor;
      stroke-width: 2;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .composer {
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.92);
      box-shadow: var(--shadow);
    }

    .field {
      display: grid;
      gap: 6px;
      margin-bottom: 12px;
    }

    label {
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0;
    }

    input,
    select {
      width: 100%;
      min-height: 46px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px 12px;
      color: var(--ink);
      background: #fff;
      outline: none;
    }

    input:focus,
    select:focus {
      border-color: var(--teal);
      box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.14);
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .primary {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      min-height: 48px;
      border: 0;
      border-radius: 8px;
      color: white;
      background: var(--teal);
      font-weight: 800;
      cursor: pointer;
    }

    .primary:active {
      background: var(--teal-dark);
      transform: translateY(1px);
    }

    .primary svg {
      width: 20px;
      height: 20px;
      stroke: currentColor;
      stroke-width: 2.4;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .status-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin: 20px 0 10px;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .tabs {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 4px;
      min-width: 186px;
      padding: 4px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #eef5f3;
    }

    .tab {
      min-height: 32px;
      border: 0;
      border-radius: 6px;
      color: var(--muted);
      background: transparent;
      font-size: 0.82rem;
      font-weight: 800;
      cursor: pointer;
    }

    .tab[aria-selected="true"] {
      color: var(--ink);
      background: #fff;
      box-shadow: 0 2px 10px rgba(23, 33, 31, 0.08);
    }

    .event-list {
      display: grid;
      gap: 10px;
      margin: 0;
      padding: 0 0 24px;
      list-style: none;
    }

    .event-card {
      position: relative;
      display: grid;
      gap: 12px;
      min-height: 156px;
      padding: 14px;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
    }

    .event-card::before {
      content: "";
      position: absolute;
      inset: 0 auto 0 0;
      width: 6px;
      background: var(--accent, var(--teal));
    }

    .event-top,
    .event-actions,
    .digits {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .event-top {
      justify-content: space-between;
      min-width: 0;
      padding-left: 4px;
    }

    .event-name {
      min-width: 0;
      margin: 0;
      overflow-wrap: anywhere;
      font-size: 1.05rem;
      line-height: 1.2;
    }

    .event-date {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 0.86rem;
    }

    .event-actions {
      flex: 0 0 auto;
    }

    .small-button {
      display: inline-grid;
      width: 34px;
      height: 34px;
      place-items: center;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--muted);
      background: #fff;
      cursor: pointer;
    }

    .small-button svg {
      width: 17px;
      height: 17px;
      stroke: currentColor;
      stroke-width: 2;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .digits {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
    }

    .digit {
      display: grid;
      place-items: center;
      min-height: 68px;
      border-radius: 8px;
      background: #f1f6f4;
    }

    .number {
      font-variant-numeric: tabular-nums;
      font-size: 1.35rem;
      font-weight: 900;
      line-height: 1;
    }

    .unit {
      margin-top: 5px;
      color: var(--muted);
      font-size: 0.68rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0;
    }

    .progress {
      height: 6px;
      overflow: hidden;
      border-radius: 999px;
      background: #e6eeeb;
    }

    .progress span {
      display: block;
      width: var(--progress, 0%);
      height: 100%;
      border-radius: inherit;
      background: var(--accent, var(--teal));
      transition: width 400ms ease;
    }

    .empty {
      display: grid;
      min-height: 220px;
      place-items: center;
      padding: 26px 18px;
      border: 1px dashed #becbc7;
      border-radius: 8px;
      color: var(--muted);
      text-align: center;
      background: rgba(255, 255, 255, 0.55);
    }

    .empty strong {
      display: block;
      margin-bottom: 6px;
      color: var(--ink);
      font-size: 1rem;
    }

    @media (min-width: 720px) {
      .app {
        padding-top: 28px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header>
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">
          <svg viewBox="0 0 24 24">
            <circle cx="12" cy="13" r="8"></circle>
            <path d="M12 13V8"></path>
            <path d="M12 13l4 3"></path>
            <path d="M9 2h6"></path>
          </svg>
        </div>
        <div>
          <h1>CountNow</h1>
          <p class="today" id="todayLabel"></p>
        </div>
      </div>
      <button class="icon-button" id="clearFinished" type="button" title="Clear finished events" aria-label="Clear finished events">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M3 6h18"></path>
          <path d="M8 6V4h8v2"></path>
          <path d="M6 6l1 15h10l1-15"></path>
        </svg>
      </button>
    </header>

    <form class="composer" id="eventForm">
      <div class="field">
        <label for="eventName">Event</label>
        <input id="eventName" name="eventName" autocomplete="off" maxlength="70" placeholder="Birthday dinner" required>
      </div>
      <div class="row">
        <div class="field">
          <label for="eventDate">Date</label>
          <input id="eventDate" name="eventDate" type="date" required>
        </div>
        <div class="field">
          <label for="eventTime">Time</label>
          <input id="eventTime" name="eventTime" type="time" required>
        </div>
      </div>
      <div class="field">
        <label for="eventColor">Color</label>
        <select id="eventColor" name="eventColor" aria-label="Event color">
          <option value="#0f766e">Teal</option>
          <option value="#d75b48">Coral</option>
          <option value="#e6a700">Amber</option>
          <option value="#6851a4">Plum</option>
        </select>
      </div>
      <button class="primary" type="submit">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M12 5v14"></path>
          <path d="M5 12h14"></path>
        </svg>
        Add event
      </button>
    </form>

    <section class="status-bar" aria-live="polite">
      <span id="eventCount">0 events</span>
      <div class="tabs" role="tablist" aria-label="Event filter">
        <button class="tab" type="button" data-filter="all" aria-selected="true">All</button>
        <button class="tab" type="button" data-filter="soon" aria-selected="false">Soon</button>
        <button class="tab" type="button" data-filter="done" aria-selected="false">Done</button>
      </div>
    </section>

    <ul class="event-list" id="eventList"></ul>
  </main>

  <template id="eventTemplate">
    <li class="event-card">
      <div class="event-top">
        <div>
          <h2 class="event-name"></h2>
          <p class="event-date"></p>
        </div>
        <div class="event-actions">
          <button class="small-button edit" type="button" title="Edit event" aria-label="Edit event">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 20h9"></path>
              <path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"></path>
            </svg>
          </button>
          <button class="small-button delete" type="button" title="Delete event" aria-label="Delete event">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M3 6h18"></path>
              <path d="M8 6V4h8v2"></path>
              <path d="M6 6l1 15h10l1-15"></path>
            </svg>
          </button>
        </div>
      </div>
      <div class="digits" aria-label="Countdown">
        <div class="digit"><span><span class="number days">0</span><span class="unit">Days</span></span></div>
        <div class="digit"><span><span class="number hours">0</span><span class="unit">Hours</span></span></div>
        <div class="digit"><span><span class="number minutes">0</span><span class="unit">Mins</span></span></div>
        <div class="digit"><span><span class="number seconds">0</span><span class="unit">Secs</span></span></div>
      </div>
      <div class="progress" aria-hidden="true"><span></span></div>
    </li>
  </template>

  <script>
    const storageKey = "countnow.events.v1";
    const form = document.querySelector("#eventForm");
    const list = document.querySelector("#eventList");
    const template = document.querySelector("#eventTemplate");
    const countLabel = document.querySelector("#eventCount");
    const todayLabel = document.querySelector("#todayLabel");
    const clearFinished = document.querySelector("#clearFinished");
    const tabs = document.querySelectorAll(".tab");
    let currentFilter = "all";
    let editingId = null;
    let events = loadEvents();

    const formatDate = new Intl.DateTimeFormat(undefined, {
      weekday: "short",
      month: "short",
      day: "numeric",
      hour: "numeric",
      minute: "2-digit"
    });

    todayLabel.textContent = new Intl.DateTimeFormat(undefined, {
      weekday: "long",
      month: "long",
      day: "numeric"
    }).format(new Date());

    setDefaultDateTime();
    render();
    setInterval(renderCountdowns, 1000);

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      const data = new FormData(form);
      const name = data.get("eventName").trim();
      const date = data.get("eventDate");
      const time = data.get("eventTime");
      const color = data.get("eventColor");
      const target = new Date(`${date}T${time}`);

      if (!name || Number.isNaN(target.getTime())) return;

      if (editingId) {
        events = events.map((item) => item.id === editingId
          ? { ...item, name, color, target: target.toISOString() }
          : item
        );
        editingId = null;
        form.querySelector(".primary").lastChild.textContent = " Add event";
      } else {
        events.push({
          id: crypto.randomUUID(),
          name,
          color,
          target: target.toISOString(),
          created: new Date().toISOString()
        });
      }

      saveEvents();
      form.reset();
      setDefaultDateTime();
      render();
    });

    list.addEventListener("click", (event) => {
      const button = event.target.closest("button");
      const card = event.target.closest(".event-card");
      if (!button || !card) return;

      const selected = events.find((item) => item.id === card.dataset.id);
      if (!selected) return;

      if (button.classList.contains("delete")) {
        events = events.filter((item) => item.id !== selected.id);
        saveEvents();
        render();
      }

      if (button.classList.contains("edit")) {
        const target = new Date(selected.target);
        document.querySelector("#eventName").value = selected.name;
        document.querySelector("#eventDate").value = dateInputValue(target);
        document.querySelector("#eventTime").value = target.toTimeString().slice(0, 5);
        document.querySelector("#eventColor").value = selected.color;
        editingId = selected.id;
        form.querySelector(".primary").lastChild.textContent = " Save event";
        document.querySelector("#eventName").focus();
      }
    });

    clearFinished.addEventListener("click", () => {
      const now = Date.now();
      events = events.filter((item) => new Date(item.target).getTime() > now);
      saveEvents();
      render();
    });

    tabs.forEach((tab) => {
      tab.addEventListener("click", () => {
        currentFilter = tab.dataset.filter;
        tabs.forEach((item) => item.setAttribute("aria-selected", String(item === tab)));
        render();
      });
    });

    function render() {
      const now = Date.now();
      const sorted = [...events].sort((a, b) => new Date(a.target) - new Date(b.target));
      const visible = sorted.filter((event) => {
        const delta = new Date(event.target).getTime() - now;
        if (currentFilter === "soon") return delta > 0 && delta <= 7 * 24 * 60 * 60 * 1000;
        if (currentFilter === "done") return delta <= 0;
        return true;
      });

      list.textContent = "";
      countLabel.textContent = `${visible.length} ${visible.length === 1 ? "event" : "events"}`;

      if (!visible.length) {
        const empty = document.createElement("li");
        empty.className = "empty";
        empty.innerHTML = `<span><strong>No events here yet</strong>Add one above and the countdown starts instantly.</span>`;
        list.append(empty);
        return;
      }

      visible.forEach((event) => {
        const card = template.content.firstElementChild.cloneNode(true);
        card.dataset.id = event.id;
        card.style.setProperty("--accent", event.color);
        card.querySelector(".event-name").textContent = event.name;
        card.querySelector(".event-date").textContent = formatDate.format(new Date(event.target));
        list.append(card);
      });

      renderCountdowns();
    }

    function renderCountdowns() {
      document.querySelectorAll(".event-card").forEach((card) => {
        const event = events.find((item) => item.id === card.dataset.id);
        if (!event) return;

        const now = Date.now();
        const target = new Date(event.target).getTime();
        const remaining = Math.max(0, target - now);
        const created = new Date(event.created).getTime();
        const total = Math.max(1, target - created);
        const progress = Math.min(100, Math.max(0, ((total - remaining) / total) * 100));
        const parts = splitTime(remaining);

        card.querySelector(".days").textContent = parts.days;
        card.querySelector(".hours").textContent = parts.hours;
        card.querySelector(".minutes").textContent = parts.minutes;
        card.querySelector(".seconds").textContent = parts.seconds;
        card.querySelector(".progress span").style.setProperty("--progress", `${progress}%`);
        card.classList.toggle("is-done", remaining === 0);
      });
    }

    function splitTime(ms) {
      const seconds = Math.floor(ms / 1000);
      return {
        days: Math.floor(seconds / 86400),
        hours: Math.floor((seconds % 86400) / 3600),
        minutes: Math.floor((seconds % 3600) / 60),
        seconds: seconds % 60
      };
    }

    function setDefaultDateTime() {
      const now = new Date();
      now.setHours(now.getHours() + 1, 0, 0, 0);
      document.querySelector("#eventDate").value = dateInputValue(now);
      document.querySelector("#eventTime").value = now.toTimeString().slice(0, 5);
      document.querySelector("#eventColor").value = "#0f766e";
    }

    function loadEvents() {
      try {
        return JSON.parse(localStorage.getItem(storageKey)) ?? seedEvents();
      } catch {
        return seedEvents();
      }
    }

    function dateInputValue(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    function saveEvents() {
      localStorage.setItem(storageKey, JSON.stringify(events));
    }

    function seedEvents() {
      const sample = new Date();
      sample.setDate(sample.getDate() + 2);
      sample.setHours(18, 30, 0, 0);
      return [{
        id: crypto.randomUUID(),
        name: "Launch night",
        color: "#d75b48",
        target: sample.toISOString(),
        created: new Date().toISOString()
      }];
    }

    if ("serviceWorker" in navigator && location.protocol !== "file:") {
      navigator.serviceWorker.register("service-worker.js");
    }
  </script>
</body>
</html>
